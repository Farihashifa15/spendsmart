<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendSmart</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Your CSS file -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <div class="logo">💸 SpendSmart</div>
    <p class="tagline">Track every rupee. Stay in control.</p>
  </header>

  <!-- ========== SUMMARY CARDS ========== -->
  <section class="summary">

    <!-- Total spent -->
    <div class="card card--total">
      <span class="card__label">Total Spent</span>
      <span class="card__amount" id="total">₹0.00</span>
    </div>

    <!-- Highest category -->
    <div class="card">
      <span class="card__label">Top Category</span>
      <span class="card__amount" id="top-category">—</span>
    </div>

    <!-- Number of entries -->
    <div class="card">
      <span class="card__label">Entries</span>
      <span class="card__amount" id="entry-count">0</span>
    </div>

  </section>

  <!-- ========== ADD EXPENSE FORM ========== -->
  <section class="form-section">
    <h2 class="section-title">Add Expense</h2>

    <form id="expense-form">

      <!-- Expense name -->
      <div class="form-group">
        <label for="expense-name">What did you spend on?</label>
        <input type="text" id="expense-name" placeholder="e.g. Lunch, Uber, Netflix" required />
      </div>

      <!-- Amount -->
      <div class="form-group">
        <label for="expense-amount">Amount (₹)</label>
        <input type="number" id="expense-amount" placeholder="0.00" min="0" step="0.01" required />
      </div>

      <!-- Category dropdown -->
      <div class="form-group">
        <label for="expense-category">Category</label>
        <select id="expense-category">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Bills">💡 Bills</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>

      <!-- Date -->
      <div class="form-group">
        <label for="expense-date">Date</label>
        <input type="date" id="expense-date" required />
      </div>

      <!-- Submit button -->
      <button type="submit" class="btn-add">+ Add Expense</button>

    </form>
  </section>

  <!-- ========== EXPENSE LIST ========== -->
  <section class="list-section">

    <div class="list-header">
      <h2 class="section-title">Your Expenses</h2>

      <!-- Filter by category -->
      <select id="filter-category">
        <option value="All">All Categories</option>
        <option value="Food">🍔 Food</option>
        <option value="Transport">🚗 Transport</option>
        <option value="Entertainment">🎬 Entertainment</option>
        <option value="Shopping">🛍️ Shopping</option>
        <option value="Health">💊 Health</option>
        <option value="Bills">💡 Bills</option>
        <option value="Other">📦 Other</option>
      </select>
    </div>

    <!-- Expenses will be injected here by JS -->
    <ul id="expense-list"></ul>

    <!-- Empty state message -->
    <div class="empty-state" id="empty-state">
      <p>No expenses yet. Add one above! 👆</p>
    </div>

    <!-- Clear all button -->
    <button class="btn-clear" id="clear-all">🗑️ Clear All</button>

  </section>

  <!-- Your JavaScript file — always at the bottom of body -->
  <script src="script.js"></script>

</body>
</html>
