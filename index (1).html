<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpendSmart</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Chart.js — for the spending chart -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Your CSS -->
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header>
    <div class="logo">💸 SpendSmart</div>
    <p class="tagline">Track every rupee. Stay in control.</p>
  </header>

  <!-- ========== SUMMARY CARDS ========== -->
  <section class="summary">
    <div class="card card--total">
      <span class="card__label">Total Spent</span>
      <span class="card__amount" id="total">₹0.00</span>
    </div>
    <div class="card">
      <span class="card__label">Top Category</span>
      <span class="card__amount" id="top-category">—</span>
    </div>
    <div class="card">
      <span class="card__label">Entries</span>
      <span class="card__amount" id="entry-count">0</span>
    </div>
  </section>

  <!-- ========== BUDGET LIMIT SECTION ========== -->
  <section class="budget-section">
    <h2 class="section-title">Monthly Budget</h2>

    <div class="budget-controls">
      <!-- Input to set budget -->
      <div class="form-group" style="flex:1;">
        <label for="budget-input">Set Budget (₹)</label>
        <input type="number" id="budget-input" placeholder="e.g. 5000" min="0" step="100"/>
      </div>
      <button class="btn-set-budget" onclick="setBudget()">Set</button>
    </div>

    <!-- Progress bar — fills up as you spend -->
    <div class="budget-bar-wrapper" id="budget-bar-wrapper" style="display:none;">
      <div class="budget-bar-labels">
        <span id="budget-spent-label">Spent: ₹0</span>
        <span id="budget-limit-label">Limit: ₹0</span>
      </div>
      <div class="budget-bar-track">
        <div class="budget-bar-fill" id="budget-bar-fill"></div>
      </div>
      <p class="budget-status" id="budget-status"></p>
    </div>
  </section>

  <!-- ========== ADD EXPENSE FORM ========== -->
  <section class="form-section">
    <h2 class="section-title">Add Expense</h2>
    <form id="expense-form">
      <div class="form-group">
        <label for="expense-name">What did you spend on?</label>
        <input type="text" id="expense-name" placeholder="e.g. Lunch, Uber, Netflix" required />
      </div>
      <div class="form-group">
        <label for="expense-amount">Amount (₹)</label>
        <input type="number" id="expense-amount" placeholder="0.00" min="0" step="0.01" required />
      </div>
      <div class="form-group">
        <label for="expense-category">Category</label>
        <select id="expense-category">
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Bills">💡 Bills</option>
          <option value="Other">📦 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="expense-date">Date</label>
        <input type="date" id="expense-date" required />
      </div>
      <button type="submit" class="btn-add">+ Add Expense</button>
    </form>
  </section>

  <!-- ========== CHART SECTION ========== -->
  <section class="chart-section">
    <h2 class="section-title">Spending Breakdown</h2>
    <div class="chart-wrapper">
      <!-- Toggle buttons -->
      <div class="chart-toggle">
        <button class="toggle-btn active" id="btn-pie" onclick="switchChart('pie')">Pie</button>
        <button class="toggle-btn" id="btn-bar" onclick="switchChart('bar')">Bar</button>
      </div>
      <!-- The canvas where Chart.js draws -->
      <canvas id="spending-chart"></canvas>
      <p class="chart-empty" id="chart-empty">Add expenses to see your chart 📊</p>
    </div>
  </section>

  <!-- ========== EXPENSE LIST ========== -->
  <section class="list-section">
    <div class="list-header">
      <h2 class="section-title">Your Expenses</h2>
      <div class="list-actions">
        <!-- Filter -->
        <select id="filter-category">
          <option value="All">All Categories</option>
          <option value="Food">🍔 Food</option>
          <option value="Transport">🚗 Transport</option>
          <option value="Entertainment">🎬 Entertainment</option>
          <option value="Shopping">🛍️ Shopping</option>
          <option value="Health">💊 Health</option>
          <option value="Bills">💡 Bills</option>
          <option value="Other">📦 Other</option>
        </select>
        <!-- Export CSV button -->
        <button class="btn-export" onclick="exportCSV()">⬇ Export CSV</button>
      </div>
    </div>

    <ul id="expense-list"></ul>
    <div class="empty-state" id="empty-state">
      <p>No expenses yet. Add one above! 👆</p>
    </div>
    <button class="btn-clear" id="clear-all">🗑️ Clear All</button>
  </section>

  <!-- Your JS -->
  <script src="script.js"></script>

</body>
</html>
